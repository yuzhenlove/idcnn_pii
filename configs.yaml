data:
  raw_path: data/raw/pii.json
  processed_dir: data/processed
  train_path: data/processed/train.jsonl
  dev_path: data/processed/dev.jsonl
  test_path: data/processed/test.jsonl
  char2id_path: data/processed/char2id.json
  label2id_path: data/processed/label2id.json

model:
  embedding_dim: 100
  hidden_size: 300
  input_dropout: 0.35
  hidden_dropout: 0.15
  dilations: [1, 2, 1]
  kernel_size: 3
  cascade_max_span_len: 64
  cascade_pointer_size: 64

train:
  epochs: 100
  batch_size: 128
  max_len: 512
  lr: 0.0005
  beta1: 0.9
  beta2: 0.9
  epsilon: 0.000001
  weight_decay: 0.0
  grad_clip: 5.0
  token_dropout: 0.15
  drop_penalty: 0.0001
  early_stop_patience: 100
